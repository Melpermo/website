<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Melpermo | Interactive Exploration</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Explore the Melpermo ecosystem: browser games, creative tools, and AI-assisted experiments in an interactive constellation experience.">
  <meta name="keywords" content="Melpermo, indie games, creative tools, web experiments, interactive portfolio">
  <meta name="author" content="Melpermo">
  
  <!-- Google Fonts: Outfit for body, Space Grotesk for headings and tech elements -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/style.css">
  
  <!-- Favicon placeholder (can be generated/added later) -->
  <link rel="icon" type="image/png" href="assets/favicon.png" onerror="this.style.display='none'">
</head>
<body>

  <!-- Screen Reader Skip Link -->
  <a href="#app" class="sr-only-focusable">Skip to content</a>

  <!-- Ambient background effect -->
  <div id="ambient-overlay"></div>
  <div id="particles-container"></div>

  <!-- Audio Controls -->
  <button id="mute-btn" class="audio-toggle-btn unmuted" aria-label="Mute audio" title="Toggle Sound">
    <svg id="volume-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
    </svg>
  </button>

  <!-- Main Container -->
  <main id="app" class="app-container">
    
    <!-- Phase 1: Introduction Container -->
    <section id="intro-container" class="scene-container active" aria-live="polite">
      <div class="intro-content">
        <div class="intro-text-wrapper">
          <p id="intro-text" class="typewriter-text"></p>
        </div>
        <button id="start-btn" class="btn-primary hidden" aria-label="Start experience">
          <span class="btn-text">Choose your path</span>
          <span class="btn-glow"></span>
        </button>
      </div>
    </section>

    <!-- Phase 2 & 3: Constellation Container -->
    <section id="constellation-container" class="scene-container hidden" aria-hidden="true">
      
      <!-- SVG layer for connection lines -->
      <svg id="connections-svg" class="connections-layer" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>
      </svg>
      
      <!-- HTML interactive elements container -->
      <div id="nodes-container" class="nodes-layer"></div>
      
      <!-- Panel for showing active node description -->
      <div id="node-info-panel" class="info-panel hidden">
        <h2 id="info-title" class="info-title"></h2>
        <p id="info-desc" class="info-desc"></p>
        <a id="info-link" href="#" target="_blank" rel="noopener noreferrer" class="info-link-btn">
          <span>Explore Destination</span>
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="7" y1="17" x2="17" y2="7"></line>
            <polyline points="7 7 17 7 17 17"></polyline>
          </svg>
        </a>
      </div>

      <!-- Final Message overlay -->
      <div id="final-message-container" class="final-message-layer hidden">
        <p class="final-text">Every destination begins with curiosity.</p>
      </div>
      
    </section>
  </main>

  <!-- Modular Scripts -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
